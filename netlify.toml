
[build]
  # Your build command
  command = "npm run build" # or "yarn build"
  # The directory to publish (your build output)
  publish = "dist"
  # Netlify functions directory
  functions = "netlify/functions"

# TeamOps auth pages - serve static HTML (don't redirect to SPA)
[[redirects]]
  from = "/products/teamops/auth/confirm"
  to = "/products/teamops/auth/confirm.html"
  status = 200

[[redirects]]
  from = "/products/teamops/auth/reset-password"
  to = "/products/teamops/auth/reset-password.html"
  status = 200

# SPA fallback - must be AFTER specific routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200